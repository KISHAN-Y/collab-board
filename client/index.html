<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Real-Time Board</title>

  <!-- Premium Font: Outfit -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="./style.css" />
</head>

<body>
  <!-- Top Nav / Status Bar -->
  <header class="top-bar glass">
    <div class="brand">
      <div class="status-indicator"></div>
      <h1>CollabBoard</h1>
    </div>
    <div class="active-users" id="active-users-container">
      <!-- User avatars will be dynamically injected here -->
    </div>
  </header>

  <!-- Main Drawing Area -->
  <main id="canvas-container">
    <!-- Konva mounts here -->
  </main>

  <!-- Floating Tools Array -->
  <aside class="toolbar glass">
    <div class="tool-group">
      <button class="tool-btn active" data-tool="select" title="Select (V)">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M3 3l7.07 16.97 2.51-7.39 7.39-2.51L3 3z" />
        </svg>
      </button>
      <button class="tool-btn" data-tool="pen" title="Draw (P)">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M12 19l7-7 3 3-7 7-3-3z" />
          <path d="M18 13l-1.5-7.5L2 2l3.5 14.5L13 18l5-5z" />
          <path d="M2 2l7.586 7.586" />
          <circle cx="11" cy="11" r="2" />
        </svg>
      </button>
      <button class="tool-btn" data-tool="rect" title="Rectangle (R)">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="3" width="18" height="18" rx="2" ry="2" />
        </svg>
      </button>
      <button class="tool-btn" data-tool="circle" title="Circle (C)">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="10" />
        </svg>
      </button>
    </div>

    <div class="separator"></div>

    <!-- Properties Panel (Colors & Stroke) -->
    <div class="properties-panel">
      <label>Color</label>
      <div class="color-picker-grid" id="color-grid">
        <button class="color-swatch active" style="--swatch-color: #ffffff;" data-color="#ffffff"></button>
        <button class="color-swatch" style="--swatch-color: #ff3366;" data-color="#ff3366"></button>
        <button class="color-swatch" style="--swatch-color: #00e676;" data-color="#00e676"></button>
        <button class="color-swatch" style="--swatch-color: #2979ff;" data-color="#2979ff"></button>
        <button class="color-swatch" style="--swatch-color: #ffea00;" data-color="#ffea00"></button>
        <button class="color-swatch" style="--swatch-color: #aa00ff;" data-color="#aa00ff"></button>
      </div>

      <label>Stroke Width</label>
      <input type="range" id="stroke-width" min="1" max="20" value="4" class="custom-slider" />
    </div>
  </aside>

  <script type="module" src="./main.js"></script>
</body>

</html>
